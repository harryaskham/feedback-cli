name: CI

# Build + test via Nix (which provides ALL toolchains — nothing is required on
# the runner image beyond Nix + flakes). Runs on the azure-ephemeral
# self-hosted pool, which is SECRETLESS and NOT on the tailnet, so the private
# `mcp-cli` git+ssh flake input is fetched with a deploy key injected from the
# PRIVATE_DEPS_SSH_KEY GitHub Actions secret.

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: nix build + flake check
    runs-on: [self-hosted, azure-ephemeral]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # azure-ephemeral runners carry no SSH key and are not on the tailnet, so
      # inject a read-only deploy key (for the private mcp-cli input) from a
      # secret. Soft when absent so the same workflow still works on a
      # key-bearing self-hosted runner.
      - name: Load private-dep SSH key
        shell: bash
        env:
          PRIVATE_DEPS_SSH_KEY: ${{ secrets.PRIVATE_DEPS_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${PRIVATE_DEPS_SSH_KEY:-}" ]; then
            mkdir -p ~/.ssh && chmod 700 ~/.ssh
            printf '%s\n' "$PRIVATE_DEPS_SSH_KEY" > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
            ssh-keyscan -t rsa,ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null || true
          else
            echo "::warning::PRIVATE_DEPS_SSH_KEY not set; relying on a runner-side key (fails on secretless runners)"
          fi

      - name: Verify Nix is available
        shell: bash
        run: nix --version

      # The ecosystem crate (mcp-cli) is a PRIVATE git flake input fetched over
      # SSH. The Cargo.toml git dep is https://, so rewrite https->ssh so
      # buildRustPackage's fetchGit uses the injected key.
      - name: Configure private-crate git auth (https -> ssh)
        shell: bash
        run: |
          git config --global url."ssh://git@github.com/".insteadOf "https://github.com/"

      - name: Build the library
        shell: bash
        run: nix build .#feedback-cli --no-write-lock-file

      - name: Run flake checks (build + unit + doc tests)
        shell: bash
        run: nix flake check --no-write-lock-file
