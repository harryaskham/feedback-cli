name: CI

# Build + test via Nix, which provides ALL toolchains (nothing required on the
# runner image beyond Nix + flakes). The only ecosystem dependency, mcp-cli, is
# a PUBLIC repo fetched over HTTPS, so this needs no SSH key, deploy key, or
# token — it builds as-is on the secretless azure-ephemeral pool.

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: nix build + flake check
    runs-on: [self-hosted, azure-ephemeral]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Verify Nix is available
        shell: bash
        run: nix --version

      - name: Build the library
        shell: bash
        run: nix build .#feedback-cli --no-write-lock-file

      - name: Run flake checks (build + unit + doc tests)
        shell: bash
        run: nix flake check --no-write-lock-file
